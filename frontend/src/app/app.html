<div class="page-bg">
	<mat-toolbar class="hero-toolbar">
		<mat-icon>construction</mat-icon>
		<span>{{ title }}</span>
	</mat-toolbar>

	<section class="hero-copy">
		<h1>Build Desk</h1>
		<p>Plan builds, track missing pieces, and browse your LEGO catalog in one place.</p>
	</section>

	<mat-tab-group class="top-tabs" animationDuration="300ms">
		<mat-tab label="Build Actions">
			<mat-tab-group class="nested-tabs" animationDuration="250ms">
				<mat-tab label="Add Sets">
					<lego-user-sets></lego-user-sets>
				</mat-tab>
				<mat-tab label="Add Parts">
					<lego-user-parts></lego-user-parts>
				</mat-tab>
				<mat-tab label="Add Missing Parts">
					<lego-user-missing-parts></lego-user-missing-parts>
				</mat-tab>
			</mat-tab-group>
		</mat-tab>

		<mat-tab label="Set Catalogue">
			<mat-tab-group class="nested-tabs" animationDuration="250ms">
				<mat-tab label="Sets">
					<lego-sets></lego-sets>
				</mat-tab>
				<mat-tab label="Themes">
					<lego-themes></lego-themes>
				</mat-tab>
				<mat-tab label="Inventory Sets">
					<lego-inventory-sets></lego-inventory-sets>
				</mat-tab>
			</mat-tab-group>
		</mat-tab>

		<mat-tab label="All Tables">
			<mat-tab-group class="nested-tabs" animationDuration="250ms">
				<mat-tab label="Inventories"><lego-inventories></lego-inventories></mat-tab>
				<mat-tab label="Inventory Parts"><lego-inventory-parts></lego-inventory-parts></mat-tab>
				<mat-tab label="Parts"><lego-parts></lego-parts></mat-tab>
				<mat-tab label="Part Categories"><lego-part-categories></lego-part-categories></mat-tab>
				<mat-tab label="Part Relationships"><lego-part-relationships></lego-part-relationships></mat-tab>
				<mat-tab label="Elements"><lego-elements></lego-elements></mat-tab>
				<mat-tab label="Colors"><lego-colors></lego-colors></mat-tab>
				<mat-tab label="Inventory Minifigs"><lego-inventory-minifigs></lego-inventory-minifigs></mat-tab>
				<mat-tab label="Minifigs"><lego-minifigs></lego-minifigs></mat-tab>
				<mat-tab label="Inventory Sets"><lego-inventory-sets></lego-inventory-sets></mat-tab>
				<mat-tab label="Sets"><lego-sets></lego-sets></mat-tab>
				<mat-tab label="Themes"><lego-themes></lego-themes></mat-tab>
				<mat-tab label="Users"><lego-users></lego-users></mat-tab>
				<mat-tab label="User Parts"><lego-user-parts></lego-user-parts></mat-tab>
				<mat-tab label="User Missing Parts"><lego-user-missing-parts></lego-user-missing-parts></mat-tab>
				<mat-tab label="User Sets"><lego-user-sets></lego-user-sets></mat-tab>
			</mat-tab-group>
		</mat-tab>
	</mat-tab-group>
</div>
