<mat-card class="catalog-card">
  <mat-card-header>
    <mat-card-title>{{ config().title | t }} {{ 'Catalog' | t }}</mat-card-title>
    <mat-card-subtitle>{{ 'Live view of' | t }} {{ config().endpoint }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <mat-form-field appearance="outline" class="catalog-search">
      <mat-label>{{ 'Search all columns (including year)' | t }}</mat-label>
      <input
        matInput
        [ngModel]="searchTerm()"
        (ngModelChange)="handleSearchInput($event)"
        [placeholder]="'Type any value' | t"
      />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <div class="search-actions">
      <button mat-button type="button" (click)="clearSort()" [disabled]="!hasActiveSort()">
        <mat-icon>filter_alt_off</mat-icon>
        {{ 'Reset Sort' | t }}
      </button>
    </div>

    <div class="loader" *ngIf="loading()">
      <mat-spinner diameter="36"></mat-spinner>
    </div>

    <div class="table-wrap" *ngIf="!loading()">
      <table mat-table [dataSource]="sortedRows()" class="mat-elevation-z2">
        <ng-container *ngFor="let column of displayedColumns()" [matColumnDef]="column">
          <th mat-header-cell *matHeaderCellDef>
            <button type="button" class="sort-toggle" (click)="toggleSort(column)">
              <span>{{ getColumnLabel(column) | t }}</span>
              <mat-icon>{{ sortIcon(column) }}</mat-icon>
            </button>
          </th>
          <td mat-cell *matCellDef="let row">
            <ng-container *ngIf="isImageColumn(column); else plainValue">
              <img
                *ngIf="asImageUrl(row[column]) as imageUrl; else plainValue"
                [src]="imageUrl"
                [alt]="column"
                class="table-thumb"
                loading="lazy"
              />
            </ng-container>
            <ng-template #plainValue>{{ row[column] }}</ng-template>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns()"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns()"></tr>
      </table>

      <mat-paginator
        [length]="total()"
        [pageSize]="pageSize()"
        [pageSizeOptions]="pageSizeOptions()"
        [pageIndex]="page() - 1"
        (page)="onPage($event)"
      ></mat-paginator>
    </div>
  </mat-card-content>
</mat-card>
